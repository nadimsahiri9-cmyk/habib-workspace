<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Terminal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">⬡ AI Terminal</span>
        <button class="icon-btn" id="closeSidebar">✕</button>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Session</div>
        <div class="stat-row"><span>Tokens</span><span id="s-tokens">0</span></div>
        <div class="stat-row"><span>Cout</span><span id="s-cost">$0.0000</span></div>
        <div class="stat-row"><span>Messages</span><span id="s-msgs">0</span></div>
        <div class="stat-row"><span>Modele</span><span id="s-model" class="truncate">--</span></div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Outils actifs</div>
        <div id="mcpActiveList" class="mcp-active-list"></div>
        <button class="sidebar-btn" id="openMcpPanel">+ Gérer les outils</button>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Actions rapides</div>
        <button class="sidebar-btn" id="sidebarSearch">🔍 Recherche web</button>
        <button class="sidebar-btn" id="sidebarBrowse">🌐 Lire une URL</button>
        <button class="sidebar-btn" id="sidebarCode">⚙ Générer du code</button>
        <button class="sidebar-btn" id="sidebarTerminal">$ Terminal</button>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Logs</div>
        <div id="logList" class="log-list"></div>
        <button class="sidebar-btn danger" id="clearChat">✕ Effacer la conv</button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn" id="openSidebar">☰</button>
        <div class="topbar-center">
          <select id="modelSelect" class="model-select"></select>
        </div>
        <button class="icon-btn" id="toggleSettings" title="Config">⚙</button>
      </header>

      <!-- SETTINGS PANEL -->
      <div id="settingsPanel" class="overlay-panel hidden">
        <div class="panel-header">
          <span>Configuration</span>
          <button class="icon-btn" id="closeSettings">✕</button>
        </div>
        <label>Prompt système
          <textarea id="systemPrompt" rows="4"></textarea>
        </label>
        <label>Mémoire persistante
          <textarea id="memoryFacts" rows="3" placeholder="Ton prénom, contexte projet..."></textarea>
        </label>
        <label>SearXNG URL (optionnel)
          <input type="text" id="searxngUrl" placeholder="https://ton-searxng.com" />
        </label>
        <label>Terminal webhook URL
          <input type="text" id="terminalUrl" placeholder="https://ton-vps.com/exec" />
        </label>
        <button class="btn-primary" id="saveSettings">Sauvegarder</button>
      </div>

      <!-- MCP PANEL -->
      <div id="mcpPanel" class="overlay-panel hidden">
        <div class="panel-header">
          <span>Outils MCP</span>
          <button class="icon-btn" id="closeMcpPanel">✕</button>
        </div>

        <div class="mcp-presets">
          <div class="section-label">Intégrations prêtes</div>
          <div class="preset-grid">
            <button class="preset-btn" data-preset="search">🔍 Web</button>
            <button class="preset-btn" data-preset="browse">🌐 Browse</button>
            <button class="preset-btn" data-preset="terminal">$ Terminal</button>
            <button class="preset-btn" data-preset="notion">📝 Notion</button>
            <button class="preset-btn" data-preset="github">🐙 GitHub</button>
            <button class="preset-btn" data-preset="n8n">⚡ N8N</button>
            <button class="preset-btn" data-preset="telegram">✈ Telegram</button>
            <button class="preset-btn" data-preset="applenotes">🍎 Notes</button>
          </div>
        </div>

        <div class="section-label" style="margin-top:12px">Outil personnalisé</div>
        <label>Nom (mot clé)
          <input type="text" id="mcpName" placeholder="ex: notion" />
        </label>
        <label>Description
          <input type="text" id="mcpDesc" placeholder="sauvegarde dans Notion" />
        </label>
        <label>URL endpoint
          <input type="text" id="mcpUrl" placeholder="https://..." />
        </label>
        <label>Méthode
          <select id="mcpMethod"><option>POST</option><option>GET</option></select>
        </label>
        <label>Headers JSON
          <input type="text" id="mcpHeaders" placeholder='{"Authorization": "Bearer token"}' />
        </label>
        <button class="btn-primary" id="saveMcp">Ajouter</button>
        <div id="mcpList" class="mcp-list"></div>
      </div>

      <!-- CHAT -->
      <main id="chat" class="chat"></main>

      <!-- COMPOSER -->
      <form id="composer" class="composer">
        <div class="composer-tools" id="composerTools">
          <button type="button" class="tool-btn" id="btnSearch" title="Recherche web">🔍</button>
          <button type="button" class="tool-btn" id="btnBrowse" title="Lire URL">🌐</button>
          <button type="button" class="tool-btn" id="btnTerminal" title="Terminal">$</button>
          <button type="button" class="tool-btn" id="btnCode" title="Code">⚙</button>
        </div>
        <textarea id="messageInput" rows="1" placeholder="Message..."></textarea>
        <button type="submit" class="send-btn">↑</button>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
