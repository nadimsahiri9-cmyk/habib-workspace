<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Terminal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header class="topbar">
      <div>
        <h1>AI Terminal</h1>
        <div class="sub" id="modelLabel">chargement...</div>
      </div>
      <div class="topbar-btns">
        <button class="tbtn" id="toggleDebug">[ debug ]</button>
        <button class="tbtn" id="toggleSettings">[ config ]</button>
      </div>
    </header>

    <!-- DEBUG -->
    <section id="debugPanel" class="panel debug-panel hidden">
      <h2>Diagnostic</h2>
      <div class="debug-row">
        <span class="debug-label">Backend /api/chat</span>
        <span id="d-backend" class="status-pending">--</span>
      </div>
      <div class="debug-row">
        <span class="debug-label">Cle API OpenRouter</span>
        <span id="d-apikey" class="status-pending">--</span>
      </div>
      <div class="debug-row">
        <span class="debug-label">Modele actif</span>
        <span id="d-model">--</span>
      </div>
      <div class="debug-row">
        <span class="debug-label">Fonctions detectees</span>
        <span id="d-functions" class="status-pending">--</span>
      </div>
      <div class="debug-row">
        <span class="debug-label">Memoire messages</span>
        <span id="d-memory">--</span>
      </div>
      <button class="run-test" id="runTest">[ lancer le test ]</button>
    </section>

    <!-- CONFIG -->
    <section id="settings" class="panel hidden">
      <label>Modele
        <select id="modelSelect"></select>
      </label>
      <label>Prompt systeme
        <textarea id="systemPrompt" rows="3">Tu es une IA utile, concise et claire. Reponds en francais.</textarea>
      </label>
      <label>Memoire — faits persistants
        <textarea id="memoryFacts" rows="3" placeholder="Ton prenom, tes projets, tes preferences..."></textarea>
      </label>
      <label>MCP tools (JSON)
        <textarea id="mcpConfig" rows="4" placeholder='[{"name":"meteo","description":"retourne la meteo","url":"https://..."}]'></textarea>
      </label>
      <div class="btn-row">
        <button class="primary" id="saveSettings">[ sauvegarder ]</button>
        <button class="danger-btn" id="clearChat">[ effacer ]</button>
      </div>
    </section>

    <main id="chat" class="chat"></main>

    <form id="composer" class="composer">
      <textarea id="messageInput" rows="1" placeholder="..."></textarea>
      <button type="submit">envoyer</button>
    </form>

  </div>
  <script src="app.js"></script>
</body>
</html>
