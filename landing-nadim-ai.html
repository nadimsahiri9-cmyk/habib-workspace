<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nadim AI — Services</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.sub {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 2.5rem;
    }
    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
    }
    .card {
      background: #12121a;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      flex: 1 1 200px;
      min-width: 180px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #6366f1; }
    .card h3 { font-weight: 500; margin-bottom: 0.4rem; font-size: 1.1rem; }
    .card p { font-size: 0.85rem; color: #777; }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>Nadim AI</h1>
  <p class="sub">Automatisation &middot; Déploiement &middot; Solutions sur mesure</p>
  <div class="cards">
    <div class="card">
      <h3>⚡ Automatisation</h3>
      <p>Scripts, pipelines, workflows CLI</p>
    </div>
    <div class="card">
      <h3>🐳 Docker</h3>
      <p>Conteneurisation et déploiement</p>
    </div>
    <div class="card">
      <h3>🌐 Web</h3>
      <p>Landings, dashboards, apps légères</p>
    </div>
  </div>
  <footer>nadim.ai &mdash; sobre, rapide, efficace</footer>
</body>
</html>
